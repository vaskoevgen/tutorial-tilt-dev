services:
  app:
    build: ./app
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app          # mounts source so uvicorn --reload picks up changes

  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./worker:/app       # mounts source for live editing

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
